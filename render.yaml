# =============================================================================
# Render Blueprint — CollabCode
# =============================================================================
# Deploy everything with one click:
#   Render Dashboard → New → Blueprint → connect this repo
#
# Services:
#   1. collabcode-db         — PostgreSQL database (persistent)
#   2. collabcode-executor   — Python/Flask code execution API (holds JDoodle keys)
#   3. collabcode-frontend   — Next.js SSR app (proxies execution to executor)
#
# Secret env vars to fill in the Render Blueprint wizard (3 total):
#   collabcode-executor  →  JDOODLE_CLIENT_ID, JDOODLE_CLIENT_SECRET
#   collabcode-frontend  →  MISTRAL_API_KEY
# =============================================================================

databases:
  - name: collabcode-db
    plan: free
    databaseName: collabcode
    user: collabcode

services:
  # ─── 1. Code Executor (Python Flask + Gunicorn) ────────────────────────────
  - type: web
    name: collabcode-executor
    runtime: python
    rootDir: cloud-executor
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 30 main:app
    healthCheckPath: /health
    envVars:
      - key: JDOODLE_CLIENT_ID
        sync: false
      - key: JDOODLE_CLIENT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://collabcode-frontend.onrender.com

  # ─── 2. Next.js Frontend ───────────────────────────────────────────────────
  - type: web
    name: collabcode-frontend
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: collabcode-db
          property: connectionString
      - key: CLOUD_RUN_URL
        # URL of the executor service above — proxies code execution
        value: https://collabcode-executor.onrender.com
      - key: MISTRAL_API_KEY
        sync: false
