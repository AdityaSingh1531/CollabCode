
# =============================================================================
# Render Blueprint — CollabCode
# =============================================================================
# Deploy everything with one click:
#   Render Dashboard → New → Blueprint → connect this repo
# Services defined:
#   1. collabcode-db         — PostgreSQL database (persistent)
#   2. collabcode-executor   — Python/Flask code execution API
#   3. collabcode-frontend   — Next.js SSR application
#
# Shared secrets (entered once):
#   jdoodle-credentials      — JDOODLE_CLIENT_ID + JDOODLE_CLIENT_SECRET
# =============================================================================

databases:
  - name: collabcode-db
    plan: free               # Render free tier Postgres (upgrade for prod)
    databaseName: collabcode
    user: collabcode

# ─── Shared secret group — enter JDoodle keys once, used by both services ────
envVarGroups:
  - name: jdoodle-credentials
    envVars:
      - key: JDOODLE_CLIENT_ID
        sync: false
      - key: JDOODLE_CLIENT_SECRET
        sync: false

services:
  # ─── 1. Code Executor (Python Flask + Gunicorn) ────────────────────────────
  - type: web
    name: collabcode-executor
    runtime: python
    rootDir: cloud-executor
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 30 main:app
    envVarGroups:
      - jdoodle-credentials           # ← pulls JDOODLE_CLIENT_ID/SECRET from the group
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://collabcode-frontend.onrender.com
    healthCheckPath: /health

  # ─── 2. Next.js Frontend ───────────────────────────────────────────────────
  - type: web
    name: collabcode-frontend
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: node .next/standalone/server.js
    envVarGroups:
      - jdoodle-credentials           # ← same group, no duplicate entry needed
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: collabcode-db
          property: connectionString
      - key: CLOUD_RUN_URL
        value: https://collabcode-executor.onrender.com
      - key: MISTRAL_API_KEY
        sync: false
      - key: PORT
        value: 3000

